<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
      }

      main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2rem;
        height: 100%;
      }

      #login-form,
      #register-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        border: thin solid black;
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <main>
      <div class="login-container">
        <form id="login-form">
          <label for="username">Username: </label>
          <input type="text" id="username" name="username" />
          <label for="password">Password: </label>
          <input type="text" id="password" name="password" />
          <input type="submit" value="Login" name="submit" />
        </form>
      </div>
      <div class="register-container">
        <form id="register-form">
          <label for="register-username">Username: </label>
          <input type="text" id="register-username" name="username" />
          <label for="register-password">Password: </label>
          <input type="text" id="register-password" name="password" />
          <input type="submit" value="Register" name="submit" />
        </form>
      </div>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const $LoginForm = document.getElementById("login-form");

      console.log(Object.fromEntries(new FormData($LoginForm)));

      $LoginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const login = await fetch("http://localhost:1234/auth/login", {
          method: "POST",
          body: JSON.stringify({
            user_name: $LoginForm.username.value,
            user_password: $LoginForm.password.value,
          }),
          headers: {
            "Content-Type": "application/json",
          },
        });
        const res = await login.json();
        console.log(res);
      });
    </script>
  </body>
</html>
