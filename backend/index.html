<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        padding-bottom: 3rem;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      #form {
        background: rgba(0, 0, 0, 0.15);
        padding: 0.25rem;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        height: 3rem;
        box-sizing: border-box;
        backdrop-filter: blur(10px);
      }
      #input {
        border: none;
        padding: 0 1rem;
        flex-grow: 1;
        border-radius: 2rem;
        margin: 0.25rem;
      }

      #form > button {
        background: #333;
        border: none;
        padding: 0 1rem;
        margin: 0.25rem;
        border-radius: 3px;
        outline: none;
        color: #fff;
      }

      #messages {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }
      #messages > li {
        padding: 0.5rem 1rem;
      }
      #messages > li:nth-child(odd) {
        background: #efefef;
      }
    </style>
    <title>Chat</title>
  </head>
  <body>
    <h1>My First Chat</h1>
    <ul id="messages"></ul>
    <form id="form">
      <input id="input" autocomplete="off" />
      <button>send</button>
      <button class="toggle-connection">disconnect</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io({
        auth: {
          serverOffset: 0,
        },
      });

      const $form = document.getElementById("form");
      const $input = document.getElementById("input");
      const $messages = document.getElementById("messages");
      const $toggleConnection = document.querySelector(".toggle-connection");

      $form.addEventListener("submit", (e) => {
        e.preventDefault();
        if ($input.value) {
          socket.emit("chat message", $input.value);
          $input.value = "";
        }
      });

      $toggleConnection.addEventListener("click", (e) => {
        e.preventDefault();
        if (socket.connected) {
          $toggleConnection.textContent = "connect";
          socket.disconnect();
        } else {
          $toggleConnection.textContent = "disconnect";
          socket.connect();
        }
      });

      socket.on("chat message", (msg, serverOffset) => {
        socket.auth.serverOffset = serverOffset;
        const $li = document.createElement("li");
        $li.textContent = msg;
        $messages.appendChild($li);
        window.scrollTo(0, document.body.scrollHeight);
      });
    </script>
  </body>
</html>
