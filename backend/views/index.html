<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
      }

      main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2rem;
        height: 100%;
      }

      #login-form,
      #register-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        border: thin solid black;
      }

      .chat-container {
        display: flex;
        flex-direction: column;
      }

      #chat-form {
        display: flex;
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <main>
      <div class="login-container">
        <form id="login-form">
          <label for="username">Username: </label>
          <input type="text" id="username" name="username" />
          <label for="password">Password: </label>
          <input type="text" id="password" name="password" />
          <input type="submit" value="Login" name="submit" />
        </form>
      </div>
      <div class="chat-container">
        <ul id="messages-container"></ul>
        <form id="chat-form">
          <input type="text" name="chatInput" />
          <input type="submit" value="Send" />
        </form>
      </div>
      <div class="register-container">
        <form id="register-form">
          <label for="register-username">Username: </label>
          <input type="text" id="register-username" name="username" />
          <label for="register-password">Password: </label>
          <input type="text" id="register-password" name="password" />
          <input type="submit" value="Register" name="submit" />
        </form>
      </div>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const $LoginForm = document.getElementById("login-form");
      const $chatForm = document.getElementById("chat-form");
      const $main = document.querySelector("main");
      let socket = io({
        auth: {
          serverOffset: 0,
          chat_id: "7f882d59-1ef4-4b0a-aeb4-4bd447e11a0a",
        },
      });
      let login = false;

      $LoginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const res = await fetch("http://localhost:1234/auth/login", {
          method: "POST",
          body: JSON.stringify({
            user_name: $LoginForm.username.value,
            user_password: $LoginForm.password.value,
          }),
          headers: {
            "Content-Type": "application/json",
          },
        });
        const data = await res.json();

        if (data.error) {
          console.log(data);
          return;
        }

        login = true;
      });

      $chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        let res = await fetch(
          "http://localhost:1234/chat/7f882d59-1ef4-4b0a-aeb4-4bd447e11a0a/messages",
          {
            method: "POST",
            body: JSON.stringify({ message: $chatForm.chatInput.value }),
            headers: {
              "Content-Type": "application/json",
            },
          },
        );
        let message = await res.json();

        if (message.error) {
          console.log(message);
          return;
        }

        socket.emit("join room", "7f882d59-1ef4-4b0a-aeb4-4bd447e11a0a");

        socket.emit("chat message", {
          chatId: "7f882d59-1ef4-4b0a-aeb4-4bd447e11a0a",
          msg: $chatForm.chatInput.value,
        });
      });

      socket.on("chat message", ({ msg }) => {
        console.log(msg);
        let $li = document.createElement("li");
        $li.textContent = msg;
        document.getElementById("messages-container").appendChild($li);
      });
    </script>
  </body>
</html>
